<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>particle sandbox by koderDev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"></head>
<body>
    <canvas id="canvas"></canvas>

    <div class="new-badge">new -> ORBIT MODE (o)</div>

    <div id="toast"></div>
    <div id="popup"></div>

    <div id="panel">
        <div id="title">particle sandbox</div>
        <div id="hints">left click — spawn <br> right click — repulse</div>
        
        <label>gravity
            <div class="row">
                <input type="range" id="pull" min="0" max="2" step="0.1" value="0.9">
                <button class="reset-btn" data-id="pull" data-default="0.9">↺</button>
            </div>
        </label>
        <label>friction
            <div class="row">
                <input type="range" id="dampen" min="0.80" max="0.99" step="0.01" value="0.99">
                <button class="reset-btn" data-id="dampen" data-default="0.99">↺</button>
            </div>  
        </label>
        <label>spawn 
        <div class="row">
                <input type="range" id="count" min="10" max="200" step="10" value="100">
                <button class="reset-btn" data-id="count" data-default="100">↺</button>
            </div>
        </label>
        <label>size
            <div class="row">
                <input type="range" id="size" min="5" max="40" step="1" value="30">
                <button class="reset-btn" data-id="size" data-default="30">↺</button>
            </div>
        </label>

        <p id="modes">MODES:</p>

        <div class="mode-item">Tutorial (s): <span id="storyActive" class="mode-on">ON</span></div>
        <div class="mode-item">Black hole (b): <span id="bhactive" class="mode-off">off</span></div>
        <div class="mode-item">Trail (t): <span id="trailstate" class="mode-off">off</span></div>
        <div class="mode-item">Merge (m): <span id="mergestate" class="mode-off">off</span></div>
        <div class="mode-item">Gravity flip (g): <span id="flipstate" class="mode-off">off</span></div>
        <div class="mode-item">Lines (l): <span id="linestate" class="mode-off">off</span></div>
        <div class="mode-item">Interact (i): <span id="interactstate" class="mode-off">off</span></div>
        <div class="mode-item">Zero gravity (z): <span id="zerogravstate" class="mode-off">off</span></div>
        <div class="mode-item">Bubbles (n): <span id="bubblestate" class="mode-off">off</span></div>
        <div class="mode-item">Orbit (o): <span id="orbitstate" class="mode-off">off</span></div>
        <div class="mode-item">Cyclone (c): <span id="cyclonestate" class="mode-off">off</span></div>
        <div id="counter">particles: <span id="pcount">0</span></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
