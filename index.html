<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle System in JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

        <div id="controls">
      <label>Pull Strength
        <input type="range" id="pull" min="0.1" max="2" step="0.1" value="0.5">
      </label>
      <label>Dampen
        <input type="range" id="dampen" min="0.80" max="0.99" step="0.01" value="0.92">
      </label>
      <label>Particle Count
        <input type="range" id="count" min="10" max="200" step="10" value="80">
      </label>
      <label>Particle Size
        <input type="range" id="size" min="5" max="40" step="1" value="15">
      </label>
    </div>

    <script src="script.js"></script>
</body>
