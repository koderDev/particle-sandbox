<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>particle sandbox by koderDev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"></head>
<body>
    <canvas id="canvas"></canvas>

    <div id="interactPopup">
        <span>⚠ interact mode — grab & throw particles freely. turn off <kbd>I</kbd> to add new particles.</span>
    </div>

    <div id="panel">
        <div id="title">particle sandbox</div>
        <div id="hints">left click — spawn <br> right click — repulse</div>

        <label>gravity
            <div class="row">
                <input type="range" id="pull" min="0" max="2" step="0.1" value="0.9">
            </div>
        </label>
        <label>friction
            <div class="row">
                <input type="range" id="dampen" min="0.80" max="0.99" step="0.01" value="0.99">
            </div>  
        </label>
        <label>spawn 
        <div class="row">
                <input type="range" id="count" min="10" max="200" step="10" value="100">
            </div>
        </label>
        <label>size
            <div class="row">
                <input type="range" id="size" min="5" max="40" step="1" value="30">
            </div>
        </label>


        <p id="modes">MODES:</p>

        <div style="color: #555;">Story mode (s): <span style="color: #fff;" id="storyActive">ON</span></div>
        <div style="color: #555;">Black hole (b): <span id="bhactive">off</span></div>
        <div style="color: #555;">Trail (t): <span id="trailstate">off</span></div>
        <div style="color: #555;">Merge (m): <span id="mergestate">off</span></div>
        <div style="color: #555;">Gravity flip (g): <span id="flipstate">off</span></div>
        <div style="color: #555;">Lines (l): <span id="linestate">OFF</span></div>
        <div style="color: #555;">Interact (i): <span id="interactstate">off</span></div>
        <div id="counter">particles: <span id="pcount">0</span></div>



    </div>

    <script src="script.js"></script>
</body>
</html>
